name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Test
        run: bash scripts/ci.sh

  compile-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.1

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Deno compile dir
        uses: actions/cache@v4
        with:
          path: .deno-cache
          key: ${{ runner.os }}-deno-cache-${{ hashFiles('pnpm-lock.yaml', 'packages/graphy-toolkit/package.json', 'packages/graphy-toolkit-core/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deno-cache-

      - name: Compile portable graphy binary
        env:
          DENO_DIR: ${{ github.workspace }}/.deno-cache
        run: bash scripts/compile-graphy.sh

      - name: Upload graphy binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphy-linux-x64
          path: dist/bin/graphy
