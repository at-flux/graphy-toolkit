name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: |
          npm install -g npm@^11.5.1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: pnpm install --frozen-lockfile

      - name: Release npm packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec multi-semantic-release

  release-binaries:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.1
          cache: true

      - name: Compile graphy binary
        env:
          DENO_DIR: ${{ github.workspace }}/.deno-cache
        run: bash scripts/compile-graphy.sh

      - name: Attach to latest GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          if [[ -z "$TAG" || "$TAG" == "null" ]]; then
            echo "No GitHub release found — skipping binary upload"
            exit 0
          fi
          gh release upload "$TAG" dist/bin/graphy --clobber
