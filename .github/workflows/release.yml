name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Verify Node.js version
        run: node --version && node -e "const v=process.versions.node.split('.')[0]; if (v!=='24') { console.error('Expected Node 24, got', process.version); process.exit(1) }"

      - run: |
          npm install -g npm@^11.5.1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: pnpm install --frozen-lockfile

      - name: Release npm packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec multi-semantic-release

      - name: Restore workspace deps and sync lockfile
        run: |
          node scripts/sync-workspace-deps.mjs
          pnpm install --lockfile-only

      - name: Commit lockfile after release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json pnpm-lock.yaml
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync lockfile after release [skip ci]"
            git push
          fi

  release-binaries:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Verify Node.js version
        run: node --version && node -e "const v=process.versions.node.split('.')[0]; if (v!=='24') { console.error('Expected Node 24, got', process.version); process.exit(1) }"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.1

      - name: Cache Deno compile dir
        uses: actions/cache@v4
        with:
          path: .deno-cache
          key: ${{ runner.os }}-deno-cache-${{ hashFiles('pnpm-lock.yaml', 'packages/graphy-toolkit/package.json', 'packages/graphy-toolkit-core/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deno-cache-

      - name: Compile graphy binary
        env:
          DENO_DIR: ${{ github.workspace }}/.deno-cache
        run: bash scripts/compile-graphy.sh

      - name: Attach to latest GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          if [[ -z "$TAG" || "$TAG" == "null" ]]; then
            echo "No GitHub release found — skipping binary upload"
            exit 0
          fi
          gh release upload "$TAG" dist/bin/graphy --clobber
