services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    command: bash -l
    stdin_open: true
    tty: true

  compile:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: bash docker/scripts/compile-graphy.sh

  ci:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: bash docker/scripts/ci.sh

volumes:
  pnpm-store:
